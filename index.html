<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>虹を駆ける</title>
  <style>
    :root {
      --bg: #050b1c;
      --panel: rgba(13, 24, 48, 0.74);
      --line: rgba(255,255,255,0.13);
      --text: #f7f9ff;
      --muted: #aeb8ce;
      --slot: #535c72;
      --slot-border: #737d98;
      --active: #ffffff;
      --ok: #a9ffd1;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: manipulation;
    }

    button {
      font-family: inherit;
      border: 0;
      cursor: pointer;
      color: inherit;
    }

    .portrait-warning {
      display: none;
      width: 100vw;
      height: 100dvh;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 26px;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,0.08), transparent 28%),
        radial-gradient(circle at 78% 84%, rgba(95,135,255,0.13), transparent 34%),
        var(--bg);
    }

    .portrait-card {
      width: min(440px, 92vw);
      padding: 28px 22px;
      border-radius: 26px;
      border: 1px solid var(--line);
      background: rgba(12, 22, 44, 0.78);
      box-shadow: 0 24px 70px rgba(0,0,0,0.38);
    }

    .portrait-card h1 {
      margin: 0;
      font-size: 23px;
      letter-spacing: 0.08em;
    }

    .app {
      width: 100vw;
      height: 100dvh;
      display: grid;
      grid-template-rows: minmax(34px, 7dvh) 1fr minmax(72px, 19dvh);
      background:
        radial-gradient(circle at 13% 14%, rgba(255, 75, 75, 0.09), transparent 26%),
        radial-gradient(circle at 48% 8%, rgba(255, 210, 70, 0.08), transparent 24%),
        radial-gradient(circle at 86% 18%, rgba(88, 126, 255, 0.10), transparent 28%),
        linear-gradient(180deg, #08132a 0%, #050b1c 100%);
    }

    header {
      position: relative;
      display: flex;
      align-items: center;
      padding: env(safe-area-inset-top) max(16px, env(safe-area-inset-right)) 0 max(16px, env(safe-area-inset-left));
      background: rgba(3, 10, 24, 0.68);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    header::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      background: linear-gradient(90deg, #ef3b3b, #f28c28, #f5e84a, #4cc56d, #2d8cff, #3547d4, #8d4bd8);
      opacity: 0.95;
    }

    .title {
      font-size: clamp(18px, 2vw, 28px);
      font-weight: 900;
      letter-spacing: 0.13em;
      white-space: nowrap;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: 75fr 25fr;
      gap: 10px;
      padding: 10px max(12px, env(safe-area-inset-right)) 10px max(12px, env(safe-area-inset-left));
    }

    .camera-panel,
    .control-panel {
      min-height: 0;
      border-radius: 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 22px 48px rgba(0,0,0,0.27);
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .camera-panel {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #020712;
      transform: translateZ(0);
    }

    .camera-placeholder {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 46%),
        #071126;
    }

    .camera-placeholder.hidden {
      display: none;
    }

    .start-button {
      padding: 15px 32px;
      border-radius: 999px;
      background: #f7f9ff;
      color: #071126;
      font-size: clamp(16px, 1.7vw, 22px);
      font-weight: 900;
      box-shadow: 0 16px 36px rgba(0,0,0,0.36);
    }

    .camera-message {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 16px;
      margin: 0;
      color: rgba(255,255,255,0.72);
      text-align: center;
      font-size: 13px;
      line-height: 1.5;
    }

    .guide {
      position: absolute;
      width: min(56dvh, 44vw);
      aspect-ratio: 1 / 1;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.65));
    }

    .camera-ready .guide {
      opacity: 1;
    }

    .guide::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1.5px solid rgba(255,255,255,0.54);
    }

    .guide::after {
      content: "";
      position: absolute;
      inset: -1.5px;
      background:
        linear-gradient(#fff, #fff) left top / 31px 4px no-repeat,
        linear-gradient(#fff, #fff) left top / 4px 31px no-repeat,
        linear-gradient(#fff, #fff) right top / 31px 4px no-repeat,
        linear-gradient(#fff, #fff) right top / 4px 31px no-repeat,
        linear-gradient(#fff, #fff) left bottom / 31px 4px no-repeat,
        linear-gradient(#fff, #fff) left bottom / 4px 31px no-repeat,
        linear-gradient(#fff, #fff) right bottom / 31px 4px no-repeat,
        linear-gradient(#fff, #fff) right bottom / 4px 31px no-repeat;
      opacity: 0.86;
    }

    .control-panel {
      padding: clamp(10px, 1.6vw, 22px);
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      gap: clamp(8px, 1.3vw, 16px);
      align-items: center;
      text-align: center;
    }

    .selected-color {
      font-size: clamp(30px, 5vw, 58px);
      font-weight: 950;
      line-height: 1;
      text-shadow: 0 10px 28px rgba(0,0,0,0.38);
    }

    .capture-button {
      width: 100%;
      height: 100%;
      min-height: clamp(76px, 22dvh, 190px);
      padding: 12px 10px;
      border-radius: 25px;
      background:
        linear-gradient(#f8fbff, #e1e8ff) padding-box,
        linear-gradient(135deg, rgba(255,255,255,1), rgba(120,160,255,0.55)) border-box;
      border: 1px solid transparent;
      color: #071126;
      font-size: clamp(20px, 2.85vw, 40px);
      font-weight: 950;
      line-height: 1.08;
      box-shadow: 0 20px 42px rgba(0,0,0,0.36), inset 0 0 0 1px rgba(255,255,255,0.74);
      transition: transform 0.08s ease, box-shadow 0.14s ease, opacity 0.14s ease;
    }

    .capture-button:active:not(:disabled) {
      transform: scale(0.965);
      box-shadow: 0 12px 30px rgba(0,0,0,0.32), inset 0 0 0 1px rgba(255,255,255,0.74);
    }

    .capture-button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .progress {
      font-size: clamp(18px, 2.2vw, 34px);
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    .small-button {
      width: 100%;
      padding: clamp(9px, 1.25vw, 14px) 8px;
      border-radius: 16px;
      background: linear-gradient(145deg, #266348, #183d2b);
      border: 1px solid rgba(169,255,209,0.38);
      color: var(--text);
      font-size: clamp(13px, 1.2vw, 17px);
      font-weight: 900;
      box-shadow: 0 12px 25px rgba(0,0,0,0.24);
    }

    .small-button.hidden {
      visibility: hidden;
      pointer-events: none;
    }

    .roll {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      padding: 8px max(12px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      background: rgba(3, 10, 24, 0.80);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .slot {
      position: relative;
      min-width: 0;
      min-height: 0;
      height: 100%;
      border-radius: 17px;
      border: 1px solid var(--slot-border);
      background: var(--slot);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 9px 20px rgba(0,0,0,0.22);
      transform: translateY(0) scale(1);
      transition: transform 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
    }

    .slot.filled {
      border-color: rgba(255,255,255,0.18);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: brightness(1.06) contrast(1.04);
    }

    .slot.active {
      border-color: var(--active);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.85), 0 0 24px rgba(255,255,255,0.34), 0 14px 26px rgba(0,0,0,0.32);
      transform: translateY(-5px) scale(1.015);
      z-index: 2;
      filter: none;
    }

    .slot.filled.active {
      filter: brightness(1.08) contrast(1.05);
    }

    .slot-name {
      font-size: clamp(16px, 2vw, 31px);
      font-weight: 950;
      color: #f5f7ff;
      letter-spacing: 0.08em;
    }

    .roll.complete {
      animation: rollGlow 1.1s ease;
    }

    @keyframes rollGlow {
      0% { box-shadow: inset 0 0 0 rgba(255,255,255,0); }
      45% { box-shadow: inset 0 0 76px rgba(255,255,255,0.23); }
      100% { box-shadow: inset 0 0 0 rgba(255,255,255,0); }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(19dvh + 15px);
      transform: translateX(-50%) translateY(16px);
      padding: 9px 15px;
      border-radius: 999px;
      background: rgba(0,0,0,0.70);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 20;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    canvas {
      display: none;
    }

    @media (orientation: portrait) {
      .app { display: none; }
      .portrait-warning { display: flex; }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      .app {
        grid-template-rows: minmax(26px, 7dvh) 1fr minmax(64px, 21dvh);
      }

      header {
        padding-left: max(10px, env(safe-area-inset-left));
        padding-right: max(10px, env(safe-area-inset-right));
      }

      .title {
        font-size: clamp(15px, 2vw, 22px);
      }

      .main {
        gap: 7px;
        padding: 7px max(8px, env(safe-area-inset-right)) 7px max(8px, env(safe-area-inset-left));
        grid-template-columns: 77fr 23fr;
      }

      .camera-panel,
      .control-panel {
        border-radius: 13px;
      }

      .control-panel {
        padding: 7px;
        gap: 5px;
        grid-template-rows: auto 1fr auto auto;
      }

      .selected-color {
        font-size: clamp(20px, 4.2dvh, 33px);
      }

      .capture-button {
        min-height: 0;
        height: 100%;
        border-radius: 15px;
        font-size: clamp(14px, 4.1dvh, 24px);
      }

      .progress {
        font-size: clamp(14px, 3.2dvh, 22px);
      }

      .small-button {
        padding: 7px 4px;
        border-radius: 11px;
        font-size: 11px;
      }

      .roll {
        gap: 5px;
        padding: 6px max(8px, env(safe-area-inset-right)) max(6px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
      }

      .slot {
        border-radius: 11px;
      }

      .slot.active {
        transform: translateY(-3px) scale(1.01);
        box-shadow: 0 0 0 2px rgba(255,255,255,0.88), 0 0 16px rgba(255,255,255,0.32), 0 10px 18px rgba(0,0,0,0.28);
      }

      .slot-name {
        font-size: clamp(14px, 3.7dvh, 22px);
      }

      .guide {
        width: min(58dvh, 40vw);
      }

      .camera-message {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="portrait-warning" aria-live="polite">
    <div class="portrait-card">
      <h1>横向きにしてください</h1>
    </div>
  </div>

  <main class="app" aria-label="虹を駆ける">
    <header>
      <div class="title">虹を駆ける</div>
    </header>

    <section class="main">
      <div class="camera-panel" id="cameraPanel">
        <video id="video" autoplay playsinline muted></video>
        <div class="guide" aria-hidden="true"></div>
        <div class="camera-placeholder" id="cameraPlaceholder">
          <button class="start-button" id="startButton" type="button">カメラ</button>
          <p class="camera-message" id="cameraMessage">許可してください</p>
        </div>
      </div>

      <aside class="control-panel">
        <div class="selected-color" id="selectedColor">赤</div>
        <button class="capture-button" id="captureButton" type="button" disabled>Catch the rainbow!</button>
        <div class="progress" id="progress">0/7</div>
        <button class="small-button hidden" id="saveButton" type="button">保存</button>
      </aside>
    </section>

    <nav class="roll" id="roll" aria-label="7色カメラロール"></nav>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <canvas id="captureCanvas" width="600" height="600"></canvas>
  <canvas id="saveCanvas" width="4200" height="600"></canvas>

  <script>
    const colorData = [
      { name: '赤', image: null },
      { name: '橙', image: null },
      { name: '黄', image: null },
      { name: '緑', image: null },
      { name: '青', image: null },
      { name: '藍', image: null },
      { name: '紫', image: null }
    ];

    let selectedIndex = 0;
    let stream = null;
    let toastTimer = null;

    const video = document.getElementById('video');
    const cameraPanel = document.getElementById('cameraPanel');
    const cameraPlaceholder = document.getElementById('cameraPlaceholder');
    const cameraMessage = document.getElementById('cameraMessage');
    const startButton = document.getElementById('startButton');
    const captureButton = document.getElementById('captureButton');
    const selectedColor = document.getElementById('selectedColor');
    const progress = document.getElementById('progress');
    const saveButton = document.getElementById('saveButton');
    const roll = document.getElementById('roll');
    const toast = document.getElementById('toast');
    const captureCanvas = document.getElementById('captureCanvas');
    const saveCanvas = document.getElementById('saveCanvas');

    function renderRoll() {
      roll.innerHTML = '';
      colorData.forEach((item, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'slot' + (item.image ? ' filled' : '') + (index === selectedIndex ? ' active' : '');
        button.setAttribute('aria-label', item.name);

        if (item.image) {
          button.style.backgroundImage = `url("${item.image}")`;
        } else {
          button.style.backgroundImage = '';
          const span = document.createElement('span');
          span.className = 'slot-name';
          span.textContent = item.name;
          button.appendChild(span);
        }

        button.addEventListener('click', () => selectColor(index));
        roll.appendChild(button);
      });
    }

    function selectColor(index) {
      selectedIndex = index;
      selectedColor.textContent = colorData[selectedIndex].name;
      renderRoll();
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        cameraMessage.textContent = '非対応ブラウザです';
        return;
      }

      startButton.disabled = true;
      cameraMessage.textContent = '起動中';

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        cameraPlaceholder.classList.add('hidden');
        cameraPanel.classList.add('camera-ready');
        captureButton.disabled = false;
      } catch (error) {
        console.error(error);
        startButton.disabled = false;
        cameraMessage.textContent = 'カメラを許可してください';
      }
    }

    function capturePhoto() {
      if (!stream || !video.videoWidth || !video.videoHeight) {
        showToast('準備中');
        return;
      }

      const canvas = captureCanvas;
      const ctx = canvas.getContext('2d');
      const sourceSize = Math.min(video.videoWidth, video.videoHeight);
      const sx = Math.floor((video.videoWidth - sourceSize) / 2);
      const sy = Math.floor((video.videoHeight - sourceSize) / 2);

      ctx.clearRect(0, 0, 600, 600);
      ctx.drawImage(video, sx, sy, sourceSize, sourceSize, 0, 0, 600, 600);

      colorData[selectedIndex].image = canvas.toDataURL('image/png');
      showToast(colorData[selectedIndex].name + ' ✓');

      const complete = isComplete();
      updateState();

      if (complete) {
        roll.classList.remove('complete');
        void roll.offsetWidth;
        roll.classList.add('complete');
        showToast('完成');
      } else {
        moveToNextEmpty();
      }
    }

    function moveToNextEmpty() {
      for (let step = 1; step <= colorData.length; step++) {
        const next = (selectedIndex + step) % colorData.length;
        if (!colorData[next].image) {
          selectColor(next);
          return;
        }
      }
      selectColor(selectedIndex);
    }

    function filledCount() {
      return colorData.filter(item => item.image).length;
    }

    function isComplete() {
      return filledCount() === colorData.length;
    }

    function updateState() {
      const count = filledCount();
      progress.textContent = count + '/7';
      saveButton.classList.toggle('hidden', !isComplete());
      renderRoll();
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    async function saveRainbowImage() {
      if (!isComplete()) return;

      const ctx = saveCanvas.getContext('2d');
      ctx.clearRect(0, 0, 4200, 600);

      for (let i = 0; i < colorData.length; i++) {
        const img = await loadImage(colorData[i].image);
        ctx.drawImage(img, i * 600, 0, 600, 600);
      }

      saveCanvas.toBlob(blob => {
        if (!blob) {
          showToast('保存失敗');
          return;
        }

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'niji-wo-kakeru.png';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showToast('保存');
      }, 'image/png');
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 900);
    }

    startButton.addEventListener('click', startCamera);
    captureButton.addEventListener('click', capturePhoto);
    saveButton.addEventListener('click', saveRainbowImage);

    renderRoll();
    updateState();
    selectColor(0);

    window.addEventListener('pagehide', () => {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
    });
  </script>
</body>
</html>
