<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>虹を駆ける</title>
  <style>
    :root {
      --bg: #050b1c;
      --panel: rgba(8, 18, 40, 0.82);
      --panel-strong: rgba(9, 20, 46, 0.96);
      --line: rgba(255,255,255,0.13);
      --text: #f7f9ff;
      --muted: #aeb8ce;
      --slot: #535c72;
      --slot-border: #737d98;
      --active: #ffffff;
      --ok: #a9ffd1;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: manipulation;
    }

    button {
      font-family: inherit;
      border: 0;
      cursor: pointer;
      color: inherit;
    }

    .portrait-warning {
      display: none;
      width: 100vw;
      height: 100dvh;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 26px;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,0.08), transparent 28%),
        radial-gradient(circle at 78% 84%, rgba(95,135,255,0.13), transparent 34%),
        var(--bg);
    }

    .portrait-card {
      width: min(440px, 92vw);
      padding: 28px 22px;
      border-radius: 26px;
      border: 1px solid var(--line);
      background: rgba(12, 22, 44, 0.78);
      box-shadow: 0 24px 70px rgba(0,0,0,0.38);
    }

    .portrait-card h1 {
      margin: 0;
      font-size: 23px;
      letter-spacing: 0.08em;
    }

    .app {
      width: 100vw;
      height: 100dvh;
      display: grid;
      grid-template-rows: minmax(28px, 5dvh) 1fr minmax(78px, 17dvh);
      background:
        radial-gradient(circle at 13% 14%, rgba(255, 75, 75, 0.09), transparent 26%),
        radial-gradient(circle at 48% 8%, rgba(255, 210, 70, 0.08), transparent 24%),
        radial-gradient(circle at 86% 18%, rgba(88, 126, 255, 0.10), transparent 28%),
        radial-gradient(circle at 72% 82%, rgba(120, 65, 220, 0.12), transparent 34%),
        linear-gradient(180deg, #08132a 0%, #050b1c 100%);
    }

    header {
      position: relative;
      display: flex;
      align-items: center;
      padding: env(safe-area-inset-top) max(16px, env(safe-area-inset-right)) 0 max(16px, env(safe-area-inset-left));
      background: rgba(3, 10, 24, 0.56);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    header::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      background: linear-gradient(90deg, #ef3b3b, #f28c28, #f5e84a, #4cc56d, #2d8cff, #3547d4, #8d4bd8);
      opacity: 0.95;
    }

    .title {
      font-size: clamp(17px, 1.75vw, 24px);
      font-weight: 950;
      letter-spacing: 0.13em;
      white-space: nowrap;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: 75fr 25fr;
      gap: clamp(10px, 1.1vw, 16px);
      padding: clamp(8px, 1vw, 12px) max(12px, env(safe-area-inset-right)) 10px max(12px, env(safe-area-inset-left));
    }

    .camera-panel,
    .control-panel {
      min-height: 0;
      border-radius: clamp(18px, 2vw, 28px);
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 24px 60px rgba(0,0,0,0.34), inset 0 1px 0 rgba(255,255,255,0.05);
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .camera-panel {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #020712;
      transform: translateZ(0);
    }

    .camera-placeholder {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 46%),
        #071126;
    }

    .camera-placeholder.hidden {
      display: none;
    }

    .start-button {
      position: relative;
      min-width: 190px;
      padding: 18px 40px;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #e9eeff 72%, #c4cff7 100%);
      color: #071126;
      font-size: clamp(15px, 1.55vw, 21px);
      font-weight: 950;
      border: 1px solid rgba(255,255,255,0.92);
      box-shadow:
        0 12px 0 #8b98bd,
        0 26px 48px rgba(0,0,0,0.42),
        inset 0 2px 0 rgba(255,255,255,0.95);
      transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.14s ease, background 0.18s ease;
      overflow: hidden;
    }

    .start-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
      transform: translateX(-120%);
      opacity: 0;
      pointer-events: none;
    }

    .start-button:active:not(:disabled),
    .start-button.is-pressing,
    .start-button.is-loading {
      transform: translateY(7px);
      box-shadow:
        0 5px 0 #8b98bd,
        0 16px 34px rgba(0,0,0,0.38),
        inset 0 2px 0 rgba(255,255,255,0.95);
    }

    .start-button.is-loading {
      cursor: progress;
      color: #061024;
      background: linear-gradient(180deg, #f8fbff 0%, #dbe5ff 62%, #b9c6ef 100%);
    }

    .start-button.is-loading::before {
      opacity: 1;
      animation: startSweep 1.05s ease-in-out infinite;
    }

    .start-button:disabled {
      opacity: 1;
    }

    @keyframes startSweep {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(120%); }
    }

    .camera-message {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 16px;
      margin: 0;
      color: rgba(255,255,255,0.72);
      text-align: center;
      font-size: clamp(11px, 1vw, 13px);
      line-height: 1.45;
      transition: color 0.18s ease, opacity 0.18s ease;
    }

    .camera-message.is-waiting {
      color: rgba(255,255,255,0.92);
      animation: messagePulse 1s ease-in-out infinite alternate;
    }

    @keyframes messagePulse {
      from { opacity: 0.68; }
      to { opacity: 1; }
    }

    .guide {
      position: absolute;
      width: min(56dvh, 44vw);
      aspect-ratio: 1 / 1;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.65));
    }

    .camera-ready .guide {
      opacity: 1;
    }

    .guide::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1.5px solid rgba(255,255,255,0.54);
    }

    .guide::after {
      content: "";
      position: absolute;
      inset: -1.5px;
      background:
        linear-gradient(#fff, #fff) left top / 31px 4px no-repeat,
        linear-gradient(#fff, #fff) left top / 4px 31px no-repeat,
        linear-gradient(#fff, #fff) right top / 31px 4px no-repeat,
        linear-gradient(#fff, #fff) right top / 4px 31px no-repeat,
        linear-gradient(#fff, #fff) left bottom / 31px 4px no-repeat,
        linear-gradient(#fff, #fff) left bottom / 4px 31px no-repeat,
        linear-gradient(#fff, #fff) right bottom / 31px 4px no-repeat,
        linear-gradient(#fff, #fff) right bottom / 4px 31px no-repeat;
      opacity: 0.86;
    }

    .control-panel {
      padding: clamp(10px, 1.55vw, 20px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: clamp(10px, 1.35vw, 18px);
      align-items: center;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(17,31,64,0.78), rgba(6,15,34,0.86)),
        var(--panel-strong);
    }

    .selected-color {
      justify-self: center;
      width: min(92px, 42%);
      aspect-ratio: 1 / 1;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: clamp(24px, 3.7vw, 46px);
      font-weight: 950;
      line-height: 1;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 12px 32px rgba(0,0,0,0.28);
      text-shadow: 0 8px 22px rgba(0,0,0,0.42);
    }

    .capture-button {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: clamp(96px, 25dvh, 210px);
      padding: 14px 14px 22px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, #ffffff 0%, #eef3ff 55%, #cbd6ff 100%) padding-box,
        linear-gradient(135deg, #ffffff, #98b2ff 42%, #ffffff 72%, #8d4bd8) border-box;
      border: 3px solid transparent;
      color: #061127;
      font-size: clamp(20px, 2.7vw, 38px);
      font-weight: 950;
      line-height: 1.06;
      letter-spacing: -0.02em;
      box-shadow:
        0 13px 0 #7f8cac,
        0 32px 56px rgba(0,0,0,0.46),
        0 0 0 6px rgba(255,255,255,0.08),
        inset 0 4px 0 rgba(255,255,255,0.98),
        inset 0 -16px 24px rgba(31, 57, 126, 0.20);
      isolation: isolate;
      transition: transform 0.08s ease, box-shadow 0.08s ease, opacity 0.14s ease, filter 0.14s ease;
    }



    .capture-button::before {
      content: "";
      position: absolute;
      inset: 9px 12px auto 12px;
      height: 28%;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0));
      pointer-events: none;
      z-index: -1;
    }

    .capture-button::after {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 10px;
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ef3b3b, #f28c28, #f5e84a, #4cc56d, #2d8cff, #3547d4, #8d4bd8);
      box-shadow: 0 0 14px rgba(132,145,255,0.36);
      pointer-events: none;
    }

    .capture-button:active:not(:disabled) {
      transform: translateY(8px) scale(0.99);
      box-shadow:
        0 3px 0 #8b98bd,
        0 16px 30px rgba(0,0,0,0.36),
        0 0 0 4px rgba(255,255,255,0.06),
        inset 0 3px 0 rgba(255,255,255,0.96),
        inset 0 -7px 16px rgba(31, 57, 126, 0.18);
      filter: brightness(0.99);
    }

    .capture-button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      filter: grayscale(0.3);
    }

    .capture-button.flash {
      animation: shutterFlash 0.34s ease;
    }

    @keyframes shutterFlash {
      0% { filter: brightness(1); }
      34% { filter: brightness(1.35); }
      100% { filter: brightness(1); }
    }

    .progress {
      display: none;
    }

    .small-button {
      width: 100%;
      padding: clamp(9px, 1.25vw, 14px) 8px;
      border-radius: 16px;
      background: linear-gradient(180deg, #41d987 0%, #1f8d59 100%);
      border: 1px solid rgba(169,255,209,0.38);
      color: var(--text);
      font-size: clamp(13px, 1.2vw, 17px);
      font-weight: 900;
      box-shadow: 0 8px 0 #17613e, 0 18px 28px rgba(0,0,0,0.27), inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .small-button.hidden {
      visibility: hidden;
      pointer-events: none;
    }


    .complete-label {
      display: none;
      align-self: end;
      justify-self: center;
      font-size: clamp(22px, 2.7vw, 42px);
      font-weight: 950;
      letter-spacing: 0.08em;
      text-shadow: 0 12px 30px rgba(0,0,0,0.45);
    }

    .control-panel.completed {
      grid-template-rows: 1fr auto 1fr;
    }

    .control-panel.completed .selected-color,
    .control-panel.completed .capture-button {
      display: none;
    }

    .control-panel.completed .complete-label {
      display: block;
    }

    .control-panel.completed .small-button {
      visibility: visible;
      pointer-events: auto;
      align-self: start;
      padding: clamp(16px, 2.1vw, 26px) 10px;
      border-radius: 22px;
      font-size: clamp(18px, 2vw, 30px);
      box-shadow:
        0 11px 0 #17613e,
        0 24px 44px rgba(0,0,0,0.36),
        0 0 34px rgba(80,255,170,0.20),
        inset 0 2px 0 rgba(255,255,255,0.30);
    }

    .roll {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 9px;
      padding: 8px max(12px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      background: rgba(3, 10, 24, 0.84);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .slot {
      position: relative;
      min-width: 0;
      min-height: 0;
      height: 100%;
      padding: 0;
      border-radius: 18px;
      border: 2px solid var(--slot-border);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.16), transparent 48%),
        linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.025) 46%, rgba(0,0,0,0.10)),
        linear-gradient(135deg, rgba(76,86,110,0.98), rgba(61,70,91,0.98));
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -10px 18px rgba(0,0,0,0.12),
        0 10px 24px rgba(0,0,0,0.27);
      transform: translateY(0) scale(1);
      transition: transform 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
    }

    .slot-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.0001);
    }

    .slot.filled {
      border-color: rgba(255,255,255,0.20);
      filter: brightness(1.06) contrast(1.04);
    }

    .slot.active {
      border-color: rgba(255,255,255,0.98);
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.88),
        0 0 0 5px rgba(122,174,255,0.18),
        0 0 28px rgba(115,165,255,0.44),
        0 0 44px rgba(255,112,215,0.22),
        0 12px 28px rgba(0,0,0,0.32);
      transform: none;
      z-index: 2;
      filter: none;
    }

    .slot.active::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background:
        linear-gradient(90deg, #ff5d5d, #ffd166, #7ee787, #55c7ff, #8d7bff, #ff7bd5, #ff5d5d);
      opacity: 0.95;
      padding: 3px;
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: rainbowBorder 1.5s linear infinite;
      z-index: 3;
    }

    .slot.active::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: calc(18px - 6px);
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.24), rgba(255,255,255,0.04) 42%, transparent 68%);
      opacity: 0.55;
      animation: selectedPulse 1.35s ease-in-out infinite;
      z-index: 2;
    }

    .slot.filled.active {
      filter: brightness(1.08) contrast(1.05);
    }


    .slot.caught {
      animation: caughtSlot 0.82s ease both;
    }

    .slot.caught::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.62), rgba(255,255,255,0.12) 42%, transparent 72%);
      animation: caughtShine 0.82s ease both;
      z-index: 4;
    }

    @keyframes caughtSlot {
      0% { filter: brightness(1.35) saturate(1.12); box-shadow: 0 0 0 2px rgba(255,255,255,0.95), 0 0 36px rgba(255,255,255,0.40), 0 10px 24px rgba(0,0,0,0.27); }
      100% { filter: brightness(1.06) contrast(1.04); }
    }

    @keyframes caughtShine {
      0% { opacity: 0.95; transform: scale(0.88); }
      100% { opacity: 0; transform: scale(1.18); }
    }

    @keyframes rainbowBorder {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    @keyframes selectedPulse {
      0%, 100% { opacity: 0.28; transform: scale(0.96); }
      50% { opacity: 0.72; transform: scale(1.02); }
    }

    .slot-name {
      font-size: clamp(15px, 1.85vw, 28px);
      font-weight: 950;
      color: #f5f7ff;
      letter-spacing: 0.08em;
    }

    .roll.complete {
      animation: rollGlow 1.1s ease;
    }

    @keyframes rollGlow {
      0% { box-shadow: inset 0 0 0 rgba(255,255,255,0); }
      45% { box-shadow: inset 0 0 76px rgba(255,255,255,0.23); }
      100% { box-shadow: inset 0 0 0 rgba(255,255,255,0); }
    }

    .flying-photo {
      position: fixed;
      z-index: 30;
      object-fit: cover;
      pointer-events: none;
      border-radius: 18px;
      box-shadow: 0 26px 70px rgba(0,0,0,0.48), 0 0 0 2px rgba(255,255,255,0.75);
      transform: scale(1);
      transition:
        left 0.58s cubic-bezier(.16,.92,.18,1),
        top 0.58s cubic-bezier(.16,.92,.18,1),
        width 0.58s cubic-bezier(.16,.92,.18,1),
        height 0.58s cubic-bezier(.16,.92,.18,1),
        border-radius 0.58s cubic-bezier(.16,.92,.18,1),
        opacity 0.58s ease,
        transform 0.58s cubic-bezier(.16,.92,.18,1);
    }

    .camera-panel.flash::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: rgba(255,255,255,0.28);
      animation: cameraFlash 0.22s ease forwards;
    }

    @keyframes cameraFlash {
      0% { opacity: 0; }
      35% { opacity: 1; }
      100% { opacity: 0; }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(19dvh + 15px);
      transform: translateX(-50%) translateY(16px);
      padding: 9px 15px;
      border-radius: 999px;
      background: rgba(0,0,0,0.70);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 20;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    canvas {
      display: none;
    }

    @media (orientation: portrait) {
      .app { display: none; }
      .portrait-warning { display: flex; }
    }

    @media (orientation: landscape) and (min-width: 900px) and (min-height: 560px) {
      .app {
        grid-template-rows: minmax(34px, 5dvh) 1fr minmax(92px, 16.5dvh);
      }

      header {
        padding-left: max(18px, env(safe-area-inset-left));
        padding-right: max(18px, env(safe-area-inset-right));
      }

      .main {
        grid-template-columns: minmax(0, 76fr) minmax(250px, 24fr);
        gap: 14px;
        padding: 12px max(14px, env(safe-area-inset-right)) 12px max(14px, env(safe-area-inset-left));
      }

      .camera-panel,
      .control-panel {
        border-radius: 26px;
      }

      .control-panel {
        padding: clamp(16px, 1.8vw, 24px);
        gap: 16px;
      }

      .selected-color {
        width: min(98px, 40%);
        font-size: clamp(38px, 4.2vw, 58px);
      }

      .capture-button {
        min-height: 190px;
        border-radius: 28px;
        font-size: clamp(34px, 3.1vw, 50px);
      }

      .roll {
        gap: 10px;
        padding: 9px max(14px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      }

      .slot {
        border-radius: 20px;
      }

      .slot-name {
        font-size: clamp(24px, 2.2vw, 34px);
      }

      .guide {
        width: min(58dvh, 43vw);
      }
    }

    @media (orientation: landscape) and (max-width: 899px),
           (orientation: landscape) and (max-height: 559px) {
      .app {
        grid-template-rows: minmax(20px, 5.8dvh) 1fr minmax(62px, 23dvh);
      }

      header {
        padding-left: max(9px, env(safe-area-inset-left));
        padding-right: max(9px, env(safe-area-inset-right));
      }

      .title {
        font-size: clamp(14px, 4.4dvh, 20px);
        letter-spacing: 0.09em;
      }

      .main {
        grid-template-columns: minmax(0, 78fr) minmax(120px, 22fr);
        gap: 6px;
        padding: 6px max(7px, env(safe-area-inset-right)) 6px max(7px, env(safe-area-inset-left));
      }

      .camera-panel,
      .control-panel {
        border-radius: 13px;
      }

      .control-panel {
        padding: 7px;
        gap: 6px;
        grid-template-rows: auto 1fr auto;
      }

      .selected-color {
        width: min(44px, 38%);
        font-size: clamp(20px, 7.6dvh, 31px);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 8px 20px rgba(0,0,0,0.24);
      }

      .capture-button {
        min-height: 0;
        height: 100%;
        border-radius: 16px;
        padding: 8px 7px 14px;
        font-size: clamp(15px, 5.7dvh, 25px);
        border-width: 2px;
        box-shadow:
          0 8px 0 #7f8cac,
          0 18px 30px rgba(0,0,0,0.40),
          0 0 0 3px rgba(255,255,255,0.07),
          inset 0 2px 0 rgba(255,255,255,0.96),
          inset 0 -9px 16px rgba(31,57,126,0.18);
      }

      .capture-button::before {
        inset: 6px 8px auto 8px;
        height: 22%;
        border-radius: 12px;
      }

      .capture-button::after {
        left: 10px;
        right: 10px;
        bottom: 7px;
        height: 4px;
      }

      .capture-button:active:not(:disabled) {
        transform: translateY(5px) scale(0.99);
        box-shadow:
          0 3px 0 #7f8cac,
          0 12px 20px rgba(0,0,0,0.34),
          0 0 0 3px rgba(255,255,255,0.05),
          inset 0 2px 0 rgba(255,255,255,0.96),
          inset 0 -5px 12px rgba(31,57,126,0.18);
      }

      .small-button {
        padding: 7px 4px;
        border-radius: 11px;
        font-size: 11px;
      }

      .complete-label {
        font-size: clamp(16px, 6dvh, 26px);
      }

      .control-panel.completed .small-button {
        padding: 10px 5px;
        border-radius: 13px;
        font-size: clamp(13px, 4.5dvh, 20px);
      }

      .roll {
        gap: 5px;
        padding: 6px max(7px, env(safe-area-inset-right)) max(6px, env(safe-area-inset-bottom)) max(7px, env(safe-area-inset-left));
      }

      .slot {
        border-radius: 11px;
        border-width: 2px;
      }

      .slot.active {
        transform: none;
        box-shadow:
          0 0 0 2px rgba(255,255,255,0.86),
          0 0 0 4px rgba(122,174,255,0.16),
          0 0 18px rgba(115,165,255,0.36),
          0 8px 18px rgba(0,0,0,0.28);
      }

      .slot.active::before {
        padding: 2px;
      }

      .slot.active::after {
        inset: 5px;
        border-radius: calc(11px - 4px);
      }

      .slot-name {
        font-size: clamp(14px, 4.2dvh, 22px);
      }

      .guide {
        width: min(62dvh, 42vw);
      }

      .camera-message {
        display: none;
      }

      .start-button {
        padding: 13px 26px;
        border-radius: 15px;
        font-size: clamp(13px, 4dvh, 18px);
        box-shadow:
          0 8px 0 #8b98bd,
          0 20px 38px rgba(0,0,0,0.40),
          inset 0 2px 0 rgba(255,255,255,0.95);
      }
    }

    @media (orientation: landscape) and (max-width: 760px) {
      .main {
        grid-template-columns: minmax(0, 80fr) minmax(106px, 20fr);
      }

      .selected-color {
        width: 38px;
        font-size: 24px;
      }

      .capture-button {
        font-size: clamp(14px, 5.1dvh, 21px);
        line-height: 1.04;
      }

      .small-button {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="portrait-warning" aria-live="polite">
    <div class="portrait-card">
      <h1>横向きにしてください</h1>
    </div>
  </div>

  <main class="app" aria-label="虹を駆ける">
    <header>
      <div class="title">虹を駆ける</div>
    </header>

    <section class="main">
      <div class="camera-panel" id="cameraPanel">
        <video id="video" autoplay playsinline muted></video>
        <div class="guide" aria-hidden="true"></div>
        <div class="camera-placeholder" id="cameraPlaceholder">
          <button class="start-button" id="startButton" type="button">カメラを起動</button>
          <p class="camera-message" id="cameraMessage">カメラの使用を許可してください。</p>
        </div>
      </div>

      <aside class="control-panel">
        <div class="selected-color" id="selectedColor">赤</div>
        <div class="complete-label" id="completeLabel">完成</div>
        <button class="capture-button" id="captureButton" type="button" disabled>Catch the rainbow!</button>
        <button class="small-button hidden" id="saveButton" type="button">保存</button>
      </aside>
    </section>

    <nav class="roll" id="roll" aria-label="7色カメラロール"></nav>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <canvas id="captureCanvas" width="600" height="600"></canvas>
  <canvas id="saveCanvas" width="4200" height="600"></canvas>

  <script>
    const colorData = [
      { name: '赤', image: null },
      { name: '橙', image: null },
      { name: '黄', image: null },
      { name: '緑', image: null },
      { name: '青', image: null },
      { name: '藍', image: null },
      { name: '紫', image: null }
    ];

    let selectedIndex = 0;
    let stream = null;
    let toastTimer = null;
    let isCapturing = false;

    const video = document.getElementById('video');
    const cameraPanel = document.getElementById('cameraPanel');
    const cameraPlaceholder = document.getElementById('cameraPlaceholder');
    const cameraMessage = document.getElementById('cameraMessage');
    const startButton = document.getElementById('startButton');
    const captureButton = document.getElementById('captureButton');
    const selectedColor = document.getElementById('selectedColor');
    const saveButton = document.getElementById('saveButton');
    const controlPanel = document.querySelector('.control-panel');
    const roll = document.getElementById('roll');
    const guide = document.querySelector('.guide');
    const toast = document.getElementById('toast');
    const captureCanvas = document.getElementById('captureCanvas');
    const saveCanvas = document.getElementById('saveCanvas');

    function renderRoll() {
      roll.innerHTML = '';
      colorData.forEach((item, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'slot' + (item.image ? ' filled' : '') + (index === selectedIndex ? ' active' : '');
        button.setAttribute('aria-label', item.name);

        if (item.image) {
          const img = document.createElement('img');
          img.className = 'slot-img';
          img.src = item.image;
          img.alt = '';
          button.appendChild(img);
        } else {
          const span = document.createElement('span');
          span.className = 'slot-name';
          span.textContent = item.name;
          button.appendChild(span);
        }

        button.addEventListener('click', () => selectColor(index));
        roll.appendChild(button);
      });
    }

    function selectColor(index) {
      selectedIndex = index;
      selectedColor.textContent = colorData[selectedIndex].name;
      renderRoll();
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        cameraMessage.textContent = '非対応ブラウザです';
        return;
      }

      startButton.disabled = true;
      startButton.classList.add('is-loading');
      startButton.textContent = '起動中…';
      cameraMessage.classList.add('is-waiting');
      cameraMessage.textContent = 'カメラの使用を許可してください。';

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        startButton.classList.remove('is-loading');
        cameraMessage.classList.remove('is-waiting');
        cameraPlaceholder.classList.add('hidden');
        cameraPanel.classList.add('camera-ready');
        captureButton.disabled = false;
      } catch (error) {
        console.error(error);
        startButton.disabled = false;
        startButton.classList.remove('is-loading');
        startButton.textContent = 'カメラを起動';
        cameraMessage.classList.remove('is-waiting');
        cameraMessage.textContent = 'カメラの使用を許可してください。';
      }
    }

    async function capturePhoto() {
      if (isCapturing) return;
      if (!stream || !video.videoWidth || !video.videoHeight) {
        showToast('準備中');
        return;
      }

      isCapturing = true;
      captureButton.disabled = true;
      captureButton.classList.remove('flash');
      void captureButton.offsetWidth;
      captureButton.classList.add('flash');
      cameraPanel.classList.remove('flash');
      void cameraPanel.offsetWidth;
      cameraPanel.classList.add('flash');

      const canvas = captureCanvas;
      const ctx = canvas.getContext('2d');
      const sourceSize = Math.min(video.videoWidth, video.videoHeight);
      const sx = Math.floor((video.videoWidth - sourceSize) / 2);
      const sy = Math.floor((video.videoHeight - sourceSize) / 2);

      ctx.clearRect(0, 0, 600, 600);
      ctx.drawImage(video, sx, sy, sourceSize, sourceSize, 0, 0, 600, 600);

      const dataUrl = canvas.toDataURL('image/png');
      const capturedIndex = selectedIndex;

      await animatePhotoToSlot(dataUrl, capturedIndex);

      colorData[capturedIndex].image = dataUrl;
      showToast(colorData[capturedIndex].name + ' ✓');

      const complete = isComplete();
      updateState();

      if (complete) {
        markCaught(capturedIndex);
        roll.classList.remove('complete');
        void roll.offsetWidth;
        roll.classList.add('complete');
        showToast('完成');
      } else {
        moveToNextEmptyFrom(capturedIndex);
        markCaught(capturedIndex);
      }

      isCapturing = false;
      captureButton.disabled = !stream;
    }

    function animatePhotoToSlot(dataUrl, targetIndex) {
      return new Promise(resolve => {
        const target = roll.children[targetIndex];
        if (!target) {
          resolve();
          return;
        }

        const startRect = guide.getBoundingClientRect();
        const endRect = target.getBoundingClientRect();
        const img = document.createElement('img');
        img.src = dataUrl;
        img.className = 'flying-photo';
        img.style.left = startRect.left + 'px';
        img.style.top = startRect.top + 'px';
        img.style.width = startRect.width + 'px';
        img.style.height = startRect.height + 'px';
        document.body.appendChild(img);

        requestAnimationFrame(() => {
          img.style.left = endRect.left + 'px';
          img.style.top = endRect.top + 'px';
          img.style.width = endRect.width + 'px';
          img.style.height = endRect.height + 'px';
          img.style.borderRadius = getComputedStyle(target).borderRadius;
          img.style.opacity = '0.98';
          img.style.transform = 'scale(0.98)';
        });

        const finish = () => {
          img.removeEventListener('transitionend', finish);
          img.remove();
          resolve();
        };
        img.addEventListener('transitionend', finish);
        setTimeout(finish, 680);
      });
    }

    function markCaught(index) {
      const target = roll.children[index];
      if (!target) return;
      target.classList.remove('caught');
      void target.offsetWidth;
      target.classList.add('caught');
      setTimeout(() => {
        const current = roll.children[index];
        if (current) current.classList.remove('caught');
      }, 900);
    }

    function moveToNextEmpty() {
      moveToNextEmptyFrom(selectedIndex);
    }

    function moveToNextEmptyFrom(index) {
      for (let step = 1; step <= colorData.length; step++) {
        const next = (index + step) % colorData.length;
        if (!colorData[next].image) {
          selectColor(next);
          return;
        }
      }
      selectColor(index);
    }

    function filledCount() {
      return colorData.filter(item => item.image).length;
    }

    function isComplete() {
      return filledCount() === colorData.length;
    }

    function updateState() {
      const complete = isComplete();
      saveButton.classList.toggle('hidden', !complete);
      controlPanel.classList.toggle('completed', complete);
      renderRoll();
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    async function saveRainbowImage() {
      if (!isComplete()) return;

      const ctx = saveCanvas.getContext('2d');
      ctx.clearRect(0, 0, 4200, 600);

      for (let i = 0; i < colorData.length; i++) {
        const img = await loadImage(colorData[i].image);
        ctx.drawImage(img, i * 600, 0, 600, 600);
      }

      saveCanvas.toBlob(blob => {
        if (!blob) {
          showToast('保存失敗');
          return;
        }

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'niji-wo-kakeru.png';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showToast('保存');
      }, 'image/png');
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 900);
    }

    startButton.addEventListener('pointerdown', () => {
      if (startButton.disabled) return;
      startButton.classList.add('is-pressing');
    });

    ['pointerup', 'pointercancel', 'pointerleave'].forEach((eventName) => {
      startButton.addEventListener(eventName, () => {
        if (startButton.classList.contains('is-loading')) return;
        startButton.classList.remove('is-pressing');
      });
    });

    startButton.addEventListener('click', () => {
      startButton.classList.add('is-pressing');
      setTimeout(() => startButton.classList.remove('is-pressing'), 120);
      startCamera();
    });
    captureButton.addEventListener('click', capturePhoto);
    saveButton.addEventListener('click', saveRainbowImage);

    renderRoll();
    updateState();
    selectColor(0);

    window.addEventListener('pagehide', () => {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
    });
  </script>
</body>
</html>
